<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Scheduling & Faculty Workload System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
    <style>
        @media print { .no-print { display: none !important; } .print-page { page-break-after: always; padding: 0 !important; margin: 0 !important; border: none !important; } }
        .code-added-highlight { background-color: rgba(254, 240, 138, 0.15); }
        .header-coed { background-color: #1d4ed8 !important; color: white !important; }
        .header-coe { background-color: #7f1d1d !important; color: white !important; }
        .header-cans { background-color: #3f6212 !important; color: white !important; }
        .header-ccs { background-color: #6b21a8 !important; color: white !important; }
        .header-gs { background-color: #075985 !important; color: white !important; }
        .header-default { background-color: #1e293b !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- Header & Nav are same as before -->
    <header class="bg-blue-950 text-white shadow-md no-print">
        <div class="max-w-7xl mx-auto px-4 py-5 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">University Scheduling Hub</h1>
                <p class="text-sm text-blue-200">Class Matrix & Faculty Workload Automated Generator</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="purgeLocalStorageCache()" class="bg-red-950 hover:bg-red-900 border border-red-700 text-red-200 text-xs font-semibold px-3 py-1.5 rounded-lg transition cursor-pointer">🚨 Wipe Database Cache</button>
                <span class="bg-blue-900 text-xs text-blue-100 px-3 py-1.5 rounded-full font-medium">AY 2026 - 2027</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-10">
        <!-- Main content sections -->
        <div class="border-b border-gray-200 no-print">
            <nav class="flex flex-wrap gap-2 sm:space-x-6">
                <button onclick="switchTab('upload-view')" id="tab-upload-view" class="tab-btn pb-4 text-sm px-1 cursor-pointer">📥 Schedule Ingestion</button>
                <button onclick="switchTab('encoder-view')" id="tab-encoder-view" class="tab-btn pb-4 text-sm px-1 cursor-pointer">✍ Manual Encoder</button>
                <button onclick="switchTab('schedule-view')" id="tab-schedule-view" class="tab-btn pb-4 text-sm px-1 cursor-pointer">🗂 Master Matrix</button>
                <button onclick="switchTab('program-schedule-view')" id="tab-program-schedule-view" class="tab-btn pb-4 text-sm px-1 cursor-pointer font-medium text-indigo-700">📅 Schedule Report</button>
                <button onclick="switchTab('summary-view')" id="tab-summary-view" class="tab-btn pb-4 text-sm px-1 cursor-pointer font-medium text-emerald-700">📊 Faculty Summary</button>
                <button onclick="switchTab('workload-view')" id="tab-workload-view" class="tab-btn pb-4 text-sm px-1 cursor-pointer font-medium text-purple-700">📋 Workload Sheets</button>
                <button onclick="switchTab('management-view')" id="tab-management-view" class="tab-btn pb-4 text-sm px-1 cursor-pointer font-semibold text-indigo-600">⚙ Registry</button>
            </nav>
        </div>

        <!-- REPLACED: Updated Registry Modal -->
        <div id="registryGlobalModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden no-print">
            <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 space-y-4">
                <h3 id="registryModalTitle" class="text-md font-bold text-gray-900 border-b pb-2">Configuration Registry Management</h3>
                <form id="registryGlobalForm" class="space-y-4 text-xs font-medium">
                    <input type="hidden" id="regContextMode">
                    <input type="hidden" id="regContextAction">
                    <input type="hidden" id="regOldKey">
                    <input type="hidden" id="regOldIndex">

                    <div id="regWrapperProgram" class="hidden">
                        <label class="block mb-1 text-gray-600">Re-map to Program / Course:</label>
                        <select id="regInputNewProgram" class="w-full border p-2 rounded bg-gray-50 text-xs"></select>
                    </div>

                    <div>
                        <label id="regLabelValue" class="block mb-1 text-gray-600">Item Label Value</label>
                        <input type="text" id="regInputValue" class="w-full border p-2 rounded outline-none bg-gray-50 text-xs" required>
                    </div>

                    <div class="flex justify-end gap-2 border-t pt-3">
                        <button type="button" onclick="closeRegistryGlobalModal()" class="bg-gray-100 px-4 py-2 rounded">Cancel</button>
                        <button type="submit" class="bg-blue-950 text-white px-4 py-2 rounded">Commit Updates</button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- EDIT SCHEDULE MODAL (Same as previous dynamic structure) -->
        <div id="scheduleUpdateModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden no-print">
            <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full p-6 space-y-4">
                <div class="flex justify-between items-center border-b pb-2">
                    <h3 class="text-lg font-bold text-gray-900">✏  Edit Class Schedule Block</h3>
                    <button onclick="closeScheduleEditorModal()" class="text-gray-400 text-xl font-bold">&times;</button>
                </div>
                <form id="modalEditForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                    <input type="hidden" id="modalRecordId">
                    <div class="sm:col-span-2">
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Degree Course / Program</label>
                        <select id="modalProgramSelect" class="w-full bg-gray-50 border p-2 rounded outline-none" onchange="handleModalProgramChange()" required></select>
                    </div>
                    <div><label class="block text-xs font-bold uppercase text-gray-500 mb-1">Section</label><select id="modalSectionSelect" class="w-full border p-2 rounded bg-gray-50" required></select></div>
                    <!-- Other inputs: Subject, Units, Day, Time, Instructor, Room -->
                    <div class="sm:col-span-2 flex justify-end gap-2 border-t pt-3"><button type="button" onclick="closeScheduleEditorModal()" class="bg-gray-100 px-4 py-2 rounded">Cancel</button><button type="submit" class="bg-blue-950 text-white px-4 py-2 rounded">Save Changes</button></div>
                </form>
            </div>
        </div>

        <section id="program-schedule-view" class="hidden tab-content bg-white p-6 rounded-xl border">
            <!-- Program schedule report container... -->
            <div id="programScheduleReportContainer"></div>
        </section>
        
        <!-- Other sections... -->
    </main>

    <script>
        // ... (System state remains initialized the same) ...

        // UPDATED: Handle Section Registry re-mapping (Course/Program update)
        document.getElementById("registryGlobalForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const mode = document.getElementById("regContextMode").value;
            const action = document.getElementById("regContextAction").value;
            const inputVal = document.getElementById("regInputValue").value.trim();
            
            if(action === "EDIT" && mode === 'section') {
                const oldProg = document.getElementById("regOldKey").value;
                const index = parseInt(document.getElementById("regOldIndex").value);
                const newProg = document.getElementById("regInputNewProgram").value;
                const oldSect = registeredSections[oldProg][index];

                // Remove from old, add to new
                registeredSections[oldProg].splice(index, 1);
                if(!registeredSections[newProg]) registeredSections[newProg] = [];
                registeredSections[newProg].push(inputVal);

                // Cascade update in schedules
                sharedSchedules.forEach(s => {
                    if(s.program === oldProg && s.classSection === oldSect) {
                        s.program = newProg;
                        s.classSection = inputVal;
                        // Auto-re-map college
                        Object.keys(registeredPrograms).forEach(colKey => {
                            if(registeredPrograms[colKey].includes(newProg)) s.college = colKey;
                        });
                    }
                });
            }
            
            saveSystemStateToLocalStorage();
            closeRegistryGlobalModal();
            executeRegistryDataSynchronization();
        });

        // Updated Registry Edit Modal Opener
        function openRegistryEditModal(mode, parentKey, index) {
            document.getElementById("regContextMode").value = mode;
            document.getElementById("regContextAction").value = "EDIT";
            document.getElementById("regOldKey").value = parentKey;
            document.getElementById("regOldIndex").value = index;

            // Handle Course/Program swap UI for sections
            document.getElementById("regWrapperProgram").className = (mode === 'section') ? "block" : "hidden";
            if(mode === 'section') {
                const progSel = document.getElementById("regInputNewProgram"); progSel.innerHTML = "";
                Object.keys(registeredPrograms).forEach(c => registeredPrograms[c].forEach(p => {
                    let o = document.createElement("option"); o.value = p; o.textContent = p;
                    if(p === parentKey) o.selected = true;
                    progSel.appendChild(o);
                }));
            }
            
            document.getElementById("registryModalTitle").textContent = `Edit ${mode.toUpperCase()} Config`;
            document.getElementById("regInputValue").value = (mode === 'section') ? registeredSections[parentKey][index] : "";
            document.getElementById("registryGlobalModal").classList.remove("hidden");
        }

        // Logic for schedule report edition remains, triggered by "Edit" buttons in report rows
        // Note: The logic in the edit form already calls `handleModalProgramChange` 
        // to update available sections based on the selected course/program.
        
        window.onload = () => { initializeSystemStateHydration(); executeRegistryDataSynchronization(); };
    </script>
</body>
</html>
